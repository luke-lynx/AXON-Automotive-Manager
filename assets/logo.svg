<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Gear -->
  <circle cx="400" cy="250" r="120" fill="none" stroke="#2C3E50" stroke-width="25"/>
  <g fill="#2C3E50">
    <rect x="380" y="100" width="40" height="50" rx="8"/>
    <rect x="380" y="450" width="40" height="50" rx="8"/>
    <rect x="100" y="230" width="50" height="40" rx="8"/>
    <rect x="450" y="230" width="50" height="40" rx="8"/>
    <rect x="150" y="130" width="40" height="40" rx="8" transform="rotate(45 170 150)"/>
    <rect x="530" y="310" width="40" height="40" rx="8" transform="rotate(45 550 330)"/>
    <rect x="530" y="130" width="40" height="40" rx="8" transform="rotate(-45 550 150)"/>
    <rect x="150" y="310" width="40" height="40" rx="8" transform="rotate(-45 170 330)"/>
  </g>

  <!-- Car outline (stylized) -->
  <g fill="none" stroke="#2C3E50" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body -->
    <path d="M 250 350 L 280 320 L 480 320 L 520 350 L 520 420 Q 520 450 500 450 L 240 450 Q 220 450 220 420 Z"/>
    <!-- Windows -->
    <rect x="300" y="340" width="60" height="40" rx="5"/>
    <rect x="420" y="340" width="60" height="40" rx="5"/>
  </g>

  <!-- Blue accent lines (AXON brand color) -->
  <g fill="#0052CC">
    <!-- Top arrow accent -->
    <polygon points="480,300 550,260 530,340"/>
    <!-- Bottom accent -->
    <path d="M 280 440 L 400 480 L 520 440" fill="none" stroke="#0052CC" stroke-width="15" stroke-linecap="round"/>
  </g>

  <!-- AXON Text -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="120" font-weight="bold" text-anchor="middle" fill="#2C3E50">AXON</text>

  <!-- Tagline -->
  <text x="400" y="660" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" fill="#0052CC" letter-spacing="3">AUTOMOTIVE MANAGER</text>

  <!-- Motto -->
  <text x="400" y="720" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#2C3E50" letter-spacing="2">AUTOMATE. MANAGE. DELIVER.</text>
</svg>